[language]
name = "Rust"
file_extensions = [ "rs" ]

[keywords]
keywords = [ "fn", "let", "mut", "pub", "impl", "struct", "enum", "match", "trait", "use", "mod", "const" ]

[operators]
single_char = [ "+", "-", "*", "/", "=", "<", ">", "&", "|", "!" ]
multi_char = [ "==", "!=", "<=", ">=", "&&", "||", "::", "->", "=>" ]

[comments]
single_line = "//"
multi_line_start = "/*"
multi_line_end = "*/"

[strings]
string_delimiters = [ '"', "'" ]
allow_escapes = true
escape_characters = [ "\\n", "\\t", "\\\\", "\\'", '\\"' ]

[numbers]
integer_regex = "^[+-]?[0-9]+$"
float_regex = "^[+-]?[0-9]*\\.[0-9]+([eE][+-]?[0-9]+)?$"

[identifiers]
regex = "^[a-zA-Z_][a-zA-Z0-9_]*$"

[theme]
keywords = "blue"
strings = "green"
comments = "gray"
numbers = "yellow"
identifiers = "white"
operators = "white"
